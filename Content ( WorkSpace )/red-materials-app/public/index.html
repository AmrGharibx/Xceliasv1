<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="description" content="Xcelias: The Ultimate Real Estate Mastery - An immersive educational experience for real estate professionals" />
    <title>Xcelias | The Ultimate Real Estate Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
      }
      
      html {
        scroll-behavior: auto;
      }
      
      body {
        background-color: #0f0f1a;
        color: #fff;
        font-family: 'Montserrat', 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image:
          radial-gradient(circle at top, rgba(102, 126, 234, 0.18), transparent 34%),
          linear-gradient(180deg, #0f0f1a 0%, #0c0c18 42%, #0a0a14 100%);
      }

      #root {
        min-height: 100vh;
      }

      .font-display {
        font-family: 'Fraunces', Georgia, serif;
      }
      
      ::-webkit-scrollbar {
        width: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: #0f0f1a;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #667eea, #764ba2);
        border-radius: 999px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #f093fb, #667eea);
      }
      
      ::selection {
        background: rgba(102, 126, 234, 0.35);
        color: #fff;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
