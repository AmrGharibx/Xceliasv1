<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainee Performance Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           BASE STYLES — fully self-contained, NO Tailwind CDN
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #c1121f;
            --red-dark: #9f0f19;
            --green: #16a34a;
            --orange: #f97316;
            --na: #64748b;
            --accent: #b91c1c;
            --score-line: #cbd5f5;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: #e5e7eb;
            color: #1f2937;
            line-height: 1.5;
        }

        /* ============================================================
           SCREEN LAYOUT — each .page is an A4 sheet
           ============================================================ */
        .page {
            width: 210mm;
            min-height: 297mm;
            margin: 30px auto;
            background: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* ============================================================
           COVER & OUTRO PAGES
           ============================================================ */
        .cover-layout {
            display: flex;
            height: 297mm;
        }
        .cover-sidebar {
            width: 25%;
            background: var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cover-sidebar h2 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 3.5rem;
            transform: rotate(-90deg);
            letter-spacing: 0.2em;
            white-space: nowrap;
        }
        .cover-content {
            width: 75%;
            padding: 50px 50px 30px 50px;
            display: flex;
            flex-direction: column;
        }
        .cover-logo { max-width: 360px; }
        .cover-logo svg { width: 100%; height: auto; display: block; }
        .cover-title { margin-top: 70px; }
        .cover-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .text-dark { color: var(--gray-800); }
        .text-red { color: var(--red); }

        .cover-info { margin-top: 80px; }
        .cover-info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--gray-200);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .cover-info-label { font-size: 1.1rem; color: var(--gray-500); }
        .cover-info-value { font-size: 1.1rem; color: var(--gray-500); font-weight: 300; text-align: right; }

        .cover-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--gray-100);
            font-size: 0.78rem;
            color: var(--gray-400);
        }

        /* Outro specific */
        .outro-text { margin-top: 40px; }
        .outro-text p {
            font-size: 1.05rem;
            color: var(--gray-700);
            line-height: 1.7;
            margin-bottom: 18px;
        }
        .quote-section {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 2px solid var(--gray-200);
        }
        .quote-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 14px;
        }
        .quote-text {
            font-size: 1.3rem;
            font-style: italic;
            color: var(--gray-600);
            font-weight: 300;
            line-height: 1.5;
        }
        .quote-author {
            margin-top: 10px;
            text-align: right;
            font-size: 1rem;
            color: var(--red);
            font-weight: 600;
        }

        /* ============================================================
           TRAINEE REPORT PAGES
           ============================================================ */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            border-bottom: 1px solid var(--gray-200);
            background: white;
        }
        .report-header-logo { height: 48px; }
        .report-header-logo svg { height: 100%; width: auto; display: block; }
        .report-header-right { text-align: right; }
        .report-header-right h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .report-header-right p {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-600);
        }

        .report-body { padding: 20px 28px; }

        /* Details + Score card */
        .details-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 20px;
        }
        .details-card h3 { font-size: 0.95rem; font-weight: 700; color: var(--gray-800); margin-bottom: 5px; }
        .details-card p { font-size: 0.85rem; color: var(--gray-600); }
        .details-card .label { font-weight: 600; }
        .score-big {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
            position: relative;
            padding-bottom: 10px;
        }
        .score-big::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 3px;
            background: linear-gradient(90deg, rgba(193,18,31,0.25), rgba(193,18,31,0.7));
            border-radius: 999px;
        }
        .score-big span { font-size: 1.6rem; }
        .score-green { color: var(--green); }
        .score-red { color: #dc2626; }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .badge-green { background: #bbf7d0; color: #166534; }
        .badge-blue { background: #bfdbfe; color: #1e40af; }
        .badge-yellow { background: #fef08a; color: #854d0e; }
        .badge-red { background: #fecaca; color: #991b1b; }
        .badge-gray { background: var(--gray-200); color: var(--gray-700); }

        /* Section headings */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--gray-800);
            border-left: 4px solid var(--accent);
            border-bottom: 1px solid var(--score-line);
            padding-left: 12px;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        /* Assessment box */
        .assessment-box {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .assessment-box p { font-size: 0.85rem; color: var(--gray-700); line-height: 1.6; }

        /* Two-column grid */
        .two-col { display: flex; gap: 20px; margin-bottom: 20px; }
        .two-col > div { flex: 1; }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.8rem;
        }
        .data-table th {
            background: var(--gray-50);
            padding: 8px 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-align: left;
        }
        .data-table th:last-child { text-align: right; }
        .data-table td {
            padding: 8px 12px;
            border-top: 1px solid var(--score-line);
            color: var(--gray-700);
        }
        .data-table td:last-child { text-align: right; font-weight: 500; }
        .data-table .row-total { background: var(--gray-50); }
        .data-table .row-total td { font-weight: 700; color: var(--gray-800); }
        .data-table .row-percent td { font-weight: 600; font-style: italic; color: var(--gray-800); background: var(--gray-50); }
        .data-table .row-percent-border td { border-bottom: 2px solid var(--gray-300); }
        .text-green { color: var(--green); font-weight: 600; }
        .text-orange { color: var(--orange); font-weight: 600; }
        .text-na { color: var(--na); font-weight: 600; }
        .text-attend-good { color: var(--green); font-weight: 700; }
        .text-attend-warn { color: var(--orange); font-weight: 700; }

        /* Comments box */
        .comments-box {
            background: var(--gray-50);
            border-left: 4px solid var(--gray-300);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .comments-box p { font-size: 0.85rem; color: var(--gray-700); font-style: italic; }

        /* Report footer */
        .report-footer {
            text-align: center;
            padding: 14px 28px;
            border-top: 1px solid var(--gray-200);
            font-size: 0.68rem;
            color: var(--gray-400);
        }

        /* ============================================================
           FLOATING DOWNLOAD BUTTON
           ============================================================ */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        .fab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            background: var(--red);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .fab-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(0,0,0,0.28);
            background: var(--red-dark);
        }

        /* ============================================================
           PRINT / PDF STYLES — THE KEY TO PERFECT PDF
           Native window.print() → "Save as PDF" in Chrome
           ============================================================ */
        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            html, body {
                width: 210mm;
                height: auto;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            /* Hide the download button */
            .fab-container { display: none !important; }

            /* Each .page = exactly one printed A4 page */
            .page {
                width: 210mm;
                height: 297mm;
                min-height: 297mm;
                max-height: 297mm;
                margin: 0 !important;
                padding: 0;
                box-shadow: none !important;
                border-radius: 0 !important;
                overflow: hidden;
                page-break-after: always;
                break-after: page;
                page-break-inside: avoid;
                break-inside: avoid;
            }

            /* Prevent extra blank page after last .page */
            .page:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            /* Cover/Outro layout must fill exactly 297mm */
            .cover-layout {
                height: 297mm !important;
                min-height: 297mm !important;
                max-height: 297mm !important;
                overflow: hidden;
            }

            /* Force backgrounds to render in PDF */
            .cover-sidebar {
                background: var(--red) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .details-card,
            .assessment-box,
            .comments-box,
            .data-table th,
            .data-table .row-total td,
            .data-table .row-percent td {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .badge-green { background: #bbf7d0 !important; color: #166534 !important; -webkit-print-color-adjust: exact !important; }
            .badge-blue { background: #bfdbfe !important; color: #1e40af !important; -webkit-print-color-adjust: exact !important; }
            .badge-red { background: #fecaca !important; color: #991b1b !important; -webkit-print-color-adjust: exact !important; }
            .badge-yellow { background: #fef08a !important; color: #854d0e !important; -webkit-print-color-adjust: exact !important; }

            /* SVG must be visible */
            svg { overflow: visible !important; }

            /* No extra spacing at container level */
            #all-pages {
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="fab-container">
        <button class="fab-btn" onclick="window.print()">

            Download as PDF
        </button>
    </div>

    <!-- ALL PAGES RENDERED HERE -->
    <div id="all-pages"></div>

            if (tiers.Excellent.length) p.push(`${fmt(tiers.Excellent)} achieved an 'Excellent' result with ${tiers.Excellent.length > 1 ? 'scores' : 'a score'} of ${fmtS(tiers.Excellent)}, demonstrating strong overall competency and a high level of professionalism. They are well-prepared for the field with only minor areas identified for continued development.`);
            if (tiers.Good.length) p.push(`${fmt(tiers.Good)} received a 'Good' assessment with ${tiers.Good.length > 1 ? 'scores' : 'a score'} of ${fmtS(tiers.Good)}, showing solid foundational skills and readiness for practical application with some guided support.`);
            if (tiers.Passed.length) p.push(`${fmt(tiers.Passed)} achieved a 'Passed' result with ${tiers.Passed.length > 1 ? 'scores' : 'a score'} of ${fmtS(tiers.Passed)}, meeting the minimum competency requirements.`);
            if (tiers.Failed.length) p.push(`However, ${fmt(tiers.Failed)} did not meet the passing criteria and ${tiers.Failed.length > 1 ? 'are' : 'is'} required to re-attend the training program.`);
            reportMeta.outroParagraph2 = p.join(' ');
        }
    }

    // ============================================================
    //  PAGE BUILDERS
    // ============================================================
    function buildIntroPage() {
        return `
        <div class="page">
            <div class="cover-layout">
                <div class="cover-sidebar"><h2>RED</h2></div>
                <div class="cover-content">
                    <div class="cover-logo">${LOGO_SVG}</div>
                    <div class="cover-title">
                        <h1 class="text-dark">Trainee Performance</h1>
                        <h1 class="text-red">Report</h1>
                    </div>
                    <div class="cover-info">
                        <div class="cover-info-row">
                            <span class="cover-info-label">Company Name</span>
                            <span class="cover-info-value">${reportMeta.companyName}</span>
                        </div>
                        <div class="cover-info-row">
                            <span class="cover-info-label">Batch Number</span>
                            <span class="cover-info-value">${reportMeta.batchNumber}</span>
                        </div>
                        <div class="cover-info-row">
                            <span class="cover-info-label">Number of Trainees</span>
                            <span class="cover-info-value">${trainees.length}</span>
                        </div>
                    </div>
                    <div class="cover-footer">
                        <p>Report Generated on: ${getFormattedDate()}</p>
                        <p>${getCopyrightText()}</p>
                    </div>
                </div>
            </div>
        </div>`;
    }

    function buildTraineePage(t) {
        const lateDisp = (t.attendance.late === 'N/A' || t.attendance.late === undefined) ? 'N/A' : `${t.attendance.late} Days`;
        const missedDisp = (t.attendance.missedContent === 'N/A' || t.attendance.missedContent === undefined) ? 'N/A' : `${t.attendance.missedContent}%`;
        const totalCoreMax = t.scores.mapping.max + t.scores.productKnowledge.max;
        const conductMax = t.scores.presentability.max + t.scores.softSkills.max;
        const scoreColorClass = t.assessmentResult === 'Failed' ? 'score-red' : 'score-green';
        const lateColorClass = (t.attendance.late === 'N/A' || t.attendance.late === undefined) ? 'text-na' : (t.attendance.late === 0 ? 'text-attend-good' : 'text-attend-warn');
        const absentColorClass = t.attendance.absent === 0 ? 'text-attend-good' : 'text-attend-warn';
        const missedColorClass = (t.attendance.missedContent === 'N/A' || t.attendance.missedContent === undefined) ? 'text-na' : (t.attendance.missedContent === 0 ? 'text-attend-good' : 'text-attend-warn');

        return `
        <div class="page">
            <div class="report-header">
                <div class="report-header-logo">${LOGO_SVG}</div>
                <div class="report-header-right">
                    <h1>Trainee Performance Report</h1>
                    <p>${t.batch}</p>
                </div>
            </div>
            <div class="report-body">
                <div class="details-card">
                    <div>
                        <h3>Trainee Details</h3>
                        <p><span class="label">Name:</span> ${t.name}</p>
                        <p><span class="label">Company:</span> ${t.company}</p>
                    </div>
                    <div style="text-align:right;">
                        <h3>Overall Performance</h3>
                        <div class="score-big ${scoreColorClass}">${t.overallScore}<span>%</span></div>
                        <div class="badge ${t.badgeClass}">${t.assessmentResult}</div>
                    </div>
                </div>

                <h3 class="section-title">Overall Assessment</h3>
                <div class="assessment-box"><p>${t.overallAssessment}</p></div>

                <div class="two-col">
                    <div>
                        <h3 class="section-title">Detailed Score Breakdown</h3>
                        <table class="data-table">
                            <thead><tr><th>Performance Area</th><th>Score</th></tr></thead>
                            <tbody>
                                <tr><td>Product Knowledge</td><td>${t.scores.productKnowledge.score} out of ${t.scores.productKnowledge.max}</td></tr>
                                <tr><td>Mapping</td><td>${t.scores.mapping.score} out of ${t.scores.mapping.max}</td></tr>
                                <tr class="row-total"><td>Total (Core Skills)</td><td>${t.scores.totalCore} out of ${totalCoreMax}</td></tr>
                                <tr class="row-percent row-percent-border"><td>Tech Score %</td><td>${t.scores.techScorePercent}%</td></tr>
                                <tr><td>Soft Skills</td><td>${t.scores.softSkills.score} out of ${t.scores.softSkills.max}</td></tr>
                                <tr><td>Presentability</td><td>${t.scores.presentability.score} out of ${t.scores.presentability.max}</td></tr>
                                <tr class="row-total"><td>Professional Conduct Rating</td><td>${t.scores.professionalConductRating.score} out of ${conductMax}</td></tr>
                                <tr class="row-percent"><td>Professionalism Score %</td><td>${t.scores.softScorePercent}%</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <h3 class="section-title">Attendance & Professionalism</h3>
                        <table class="data-table">
                            <thead><tr><th>Metric</th><th>Record</th></tr></thead>
                            <tbody>
                                <tr><td>Punctuality (Late Arrivals)</td><td class="${lateColorClass}">${lateDisp}</td></tr>
                                <tr><td>Attendance (Absent Days)</td><td class="${absentColorClass}">${t.attendance.absent} Day${t.attendance.absent !== 1 ? 's' : ''}</td></tr>
                                <tr><td>Missed Content Percentage</td><td class="${missedColorClass}">${missedDisp}</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <h3 class="section-title">Trainer's Comments</h3>
                <div class="comments-box"><p>"${t.comments}"</p></div>
            </div>
            <div class="report-footer">
                <p>Report Generated on: ${getFormattedDate()}</p>
                <p>${getCopyrightText()}</p>
            </div>
        </div>`;
    }

    function buildOutroPage() {
        generateOutro();
        return `
        <div class="page">
            <div class="cover-layout">
                <div class="cover-sidebar"><h2>RED</h2></div>
                <div class="cover-content">
                    <div class="cover-logo">${LOGO_SVG}</div>
                    <div class="cover-title">
                        <h1 class="text-dark">Concluding</h1>
                        <h1 class="text-red">Remarks</h1>
                    </div>
                    <div class="outro-text">
                        <p>${reportMeta.outroParagraph1}</p>
                        <p>${reportMeta.outroParagraph2}</p>
                    </div>
                    <div class="quote-section">
                        <div class="quote-label">A Final Thought</div>
                        <div class="quote-text">"The only way to do great work is to love what you do."</div>
                        <div class="quote-author">&mdash; Steve Jobs</div>
                    </div>
                    <div class="cover-footer">
                        <p>Report Generated on: ${getFormattedDate()}</p>
                        <p>${getCopyrightText()}</p>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ============================================================
    //  RENDER
    // ============================================================
    window.onload = function() {
        const container = document.getElementById('all-pages');
        let html = buildIntroPage();
        trainees.forEach(t => { html += buildTraineePage(t); });
        html += buildOutroPage();
        container.innerHTML = html;
    };
    </script>
</body>
</html>
