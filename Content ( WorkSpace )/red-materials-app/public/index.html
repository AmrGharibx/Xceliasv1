    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
      }

      html {
        scroll-behavior: auto;
      }

      body {
        background-color: #0f0f1a;
        color: #fff;
        font-family:
          "Montserrat",
          "Manrope",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image:
          radial-gradient(
            circle at top,
            rgba(102, 126, 234, 0.18),
            transparent 34%
          ),
          linear-gradient(180deg, #0f0f1a 0%, #0c0c18 42%, #0a0a14 100%);
      }

      #root {
        min-height: 100vh;
      }

      .font-display {
        font-family: "Fraunces", Georgia, serif;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #0f0f1a;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #667eea, #764ba2);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #f093fb, #667eea);
      }

      ::selection {
        background: rgba(102, 126, 234, 0.35);
        color: #fff;
      }

      /* ── Xcelias Animated Logo (shared across apps) ── */
      .xc-logo-icon {
        position: relative;
        overflow: visible !important;
      }
      .xc-logo-ring-spin {
        position: absolute;
        inset: -8px;
        border-radius: 20px;
        border: 1.5px solid transparent;
        background:
          linear-gradient(#0f0f1a, #0f0f1a) padding-box,
          linear-gradient(135deg, #667eea, #f093fb, #50fa7b, #667eea) border-box;
        animation: xcRingSpin 6s linear infinite;
      }
      .xc-logo-ring-pulse {
        position: absolute;
        inset: -14px;
        border-radius: 26px;
        border: 1px solid rgba(102, 126, 234, 0.25);
        animation: xcRingSpin 10s linear infinite reverse;
      }
      @keyframes xcRingSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .xc-orb-track {
        position: absolute;
        width: 72px;
        height: 72px;
        left: 50%;
        top: 50%;
        margin: -36px 0 0 -36px;
        border-radius: 50%;
        pointer-events: none;
      }
      .xc-orb-track--1 {
        animation: xcOrbitSpin 2.8s linear infinite;
      }
      .xc-orb-track--2 {
        animation: xcOrbitSpin 4.2s linear infinite reverse;
        animation-delay: -1.4s;
      }
      .xc-orb-track--3 {
        animation: xcOrbitSpin 6s linear infinite;
        animation-delay: -3s;
      }
      @keyframes xcOrbitSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .xc-orb {
        position: absolute;
        top: 0;
        left: 50%;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .xc-orb--1 {
        background: #667eea;
        box-shadow: 0 0 10px 3px rgba(102, 126, 234, 0.8);
      }
      .xc-orb--2 {
        background: #f093fb;
        box-shadow: 0 0 10px 3px rgba(240, 147, 251, 0.8);
        left: 100%;
        top: 50%;
      }
      .xc-orb--3 {
        background: #50fa7b;
        box-shadow: 0 0 8px 2px rgba(80, 250, 123, 0.7);
      }
      .xc-logo-svg {
        animation: xcLogoBreath 4s ease-in-out infinite;
        position: relative;
        z-index: 2;
      }
      @keyframes xcLogoBreath {
        0%,
        100% {
          filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.4));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 22px rgba(240, 147, 251, 0.7))
            drop-shadow(0 0 40px rgba(102, 126, 234, 0.3));
          transform: scale(1.06);
        }
      }
    </style>

      }

    <script>
      (function () {
        const API_URL = "/api/gemini";

        const SYSTEM_PROMPT = `You are "RITA" — an AI study guide embedded inside the Xcelias Real Estate Mastery Guide.
You help agents deeply understand the training material as they read through each chapter.

BILINGUAL: If the user writes in Arabic → reply in Egyptian Arabic (عامية مصرية). If English → reply in English.
NO_LABEL: NEVER start your response with a language label like "(بالعامية المصرية)" or "(English)" or any similar annotation. Just reply directly without any preamble.
ADDRESS: Use masculine form by default.

YOUR ROLE HERE:
• Explain concepts from any chapter the agent is reading
• Connect theory to real-world sales scenarios
• Give examples and analogies that make abstract concepts click
• Help agents memorize frameworks: 7 Pillars, Needs vs Wants, A.B.C, 7-38-55
• Create study summaries and key takeaways
• Answer "why does this matter?" for every concept

CHAPTERS YOU COVER:
1. Inventory Intelligence — Property types (Residential: Apartments/Villas/Stand Alone, Commercial: Shops/Admin/Medical, Land), Finishing ladder (Core & Shell 25% → Semi 58% → Full 84% → Furnished 100%)
2. Market Models — Broker (consultancy, diverse, opportunity) vs Developer (sales, own product, type). Primary (installments, off-plan, upside) vs Resale (cash, RTM, certainty)
3. Qualification — 7-Pillar Signal Extraction: Destination → Unit type → Delivery → Finishing → Developer → History → Budget
4. Buyer Psychology — Needs (tangible asks) vs Wants (hidden reasons). 4 hidden signals decoder. Emotion leads, logic justifies.
5. Consultant Arsenal — 8 skills radar, First Impression doctrine (21 experiences to recover), 7-accessory rule
6. Call Control — A.B.C (Always Be Closing = maintain direction), 7-38-55 rule (Words 7%, Tonality 38%, Body 55%), 6 fatal mistakes, rapport mirroring
7. Field Mastery — 6-point operating model, morning ritual

Keep responses educational and insightful. Use the training material as your source of truth.`;

        let history = [];
        const msgBox = () => document.getElementById("ritaMessages");
        const input = () => document.getElementById("ritaInput");

        function showWelcome() {
          const m = msgBox();
          if (!m) return;
          m.innerHTML =
            '<div class="rita-msg bot"><div class="rita-msg-icon">✦</div><div class="rita-msg-body"><p><strong>📚 Welcome to your study companion!</strong></p><p>I\'m RITA — I know every chapter of the Mastery Guide. Ask me anything about what you\'re reading, or let me help you review.</p><p style="font-size:.8rem;color:rgba(152,152,184,.7);margin-top:6px">💡 بتكلم عربي ولا English — أنا بتكلم الاتنين</p><div class="rita-pills"><button data-q="Summarize the 7-Pillar Qualification framework">📋 7 Pillars</button><button data-q="Explain Needs vs Wants with examples">🧠 Psychology</button><button data-q="What is the 7-38-55 rule and why does it matter?">📞 Call Control</button><button data-q="إيه الفرق بين البروكر والديفلوبر؟">🏢 Market Models</button></div></div></div>';
        }

        function addMsg(role, html) {
          const m = msgBox();
          if (!m) return;
          const d = document.createElement("div");
          d.className = "rita-msg " + (role === "user" ? "user" : "bot");
          d.innerHTML =
            '<div class="rita-msg-icon">' +
            (role === "user" ? "👤" : "✦") +
            '</div><div class="rita-msg-body">' +
            html +
            "</div>";
          m.appendChild(d);
          m.scrollTop = m.scrollHeight;
          return d;
        }

        function showThinking() {
          const d = addMsg(
            "bot",
            '<div class="rita-thinking"><span></span><span></span><span></span></div>',
          );
          if (d) d.id = "ritaThinking";
          return d;
        }

        function escHtml(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }
        function formatMd(t) {
          t = escHtml(t);
          return t
            .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
            .replace(/\*(.+?)\*/g, "<em>$1</em>")
            .replace(/^[-•]\s+(.+)/gm, "<li>$1</li>")
            .replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>")
            .replace(/\n{2,}/g, "</p><p>")
            .replace(/\n/g, "<br>")
            .replace(/^(.+)$/s, "<p>$1</p>")
            .replace(/<ul><\/ul>/g, "");
        }

        async function send(text) {
          const inp = input();
          const msg = text || (inp ? inp.value.trim() : "");
          if (!msg) return;
          if (inp) {
            inp.value = "";
            inp.style.height = "auto";
          }
          addMsg("user", "<p>" + escHtml(msg) + "</p>");
          history.push({ role: "user", content: msg });
          const thinking = showThinking();
          try {
            const chatMessages = history.map((h) => ({
              role: h.role === "assistant" ? "assistant" : "user",
              content: h.content,
            }));
            const res = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                systemPrompt: SYSTEM_PROMPT,
                messages: chatMessages,
                stream: false,
              }),
            });
            if (!res.ok) {
              const errBody = await res.json().catch(() => null);
              throw new Error(
                errBody && errBody.error
                  ? errBody.error
                  : "API returned " + res.status,
              );
            }
            const data = await res.json();
            const reply =
              data.text ||
              data.response ||
              data.error ||
              "Something went wrong.";
            if (thinking) thinking.remove();
            addMsg("bot", formatMd(reply));
            history.push({ role: "assistant", content: reply });
          } catch (e) {
            if (thinking) thinking.remove();
            addMsg(
              "bot",
              '<p style="color:#ff6b6b">⚠️ ' +
                escHtml(e.message || "Connection error") +
                "</p>",
            );
          }
          if (history.length > 20) history = history.slice(-16);
        }

        function toggle() {
          const w = document.getElementById("ritaWindow");
          if (!w) return;
          const isOpen = w.classList.contains("open");
          w.classList.toggle("open");
          if (!isOpen && !msgBox().children.length) showWelcome();
          if (!isOpen)
            setTimeout(() => {
              const i = input();
              if (i) i.focus();
            }, 350);
        }

        window.RITA = { toggle, send };

        /* Wire up event listeners (replaces inline onclick/onkeydown to satisfy CSP) */
        document.addEventListener("DOMContentLoaded", function () {
          var fabBtn = document.getElementById("ritaFabBtn");
          var closeBtn = document.getElementById("ritaCloseBtn");
          var sendBtn = document.getElementById("ritaSendBtn");
          var inp = document.getElementById("ritaInput");
          if (fabBtn) fabBtn.addEventListener("click", toggle);
          if (closeBtn) closeBtn.addEventListener("click", toggle);
          if (sendBtn)
            sendBtn.addEventListener("click", function () {
              send();
            });
          if (inp)
            inp.addEventListener("keydown", function (e) {
              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
              }
            });
        });

        /* Pill buttons are injected via innerHTML — use event delegation */
        document.addEventListener("click", function (e) {
          var q = e.target.getAttribute && e.target.getAttribute("data-q");
          if (q) send(q);
        });
      })();
    </script>
